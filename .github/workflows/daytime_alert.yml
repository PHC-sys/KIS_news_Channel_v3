name: Daytime Alert

on:
  workflow_dispatch:        # cron-job.org 또는 수동 실행

jobs:
  daytime-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # alert_db 커밋을 위해 필요

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      DIGEST_CHAT_ID:     ${{ secrets.DIGEST_CHAT_ID }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 낮 시간 알림 (daytime_alert.py)
        run: python daytime_alert.py

      - name: alert_db 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alert_db/
          git diff --staged --quiet || git commit -m "auto: alert $(TZ=Asia/Seoul date +%Y-%m-%d\ %H:%M)"
          git pull --rebase origin main
          git push
