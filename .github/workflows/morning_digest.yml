name: Morning Digest

on:
  workflow_dispatch:        # cron-job.org 또는 수동 실행

jobs:
  morning-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # digest_db 커밋을 위해 필요

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      DIGEST_CHAT_ID:     ${{ secrets.DIGEST_CHAT_ID }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: RSS 수집 (collect.py)
        run: python collect.py

      - name: 다이제스트 생성 (generate_digest.py)
        run: python generate_digest.py

      - name: 텔레그램 발송 (send_digest.py)
        run: python send_digest.py

      - name: 수집 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest_db/ last_digest.txt
          git diff --staged --quiet || git commit -m "auto: digest $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
